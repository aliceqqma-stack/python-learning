<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Semester Grade Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero">
      <p class="eyebrow">University Grade Tool</p>
      <h1>University Semester Grade Calculator</h1>
      <p class="subtitle">
        Add your modules, enter assessments, and calculate both module grades and your semester average.
      </p>
    </section>

    <section class="toolbar">
      <button id="add-module-btn" type="button">+ Add Module</button>
      <button id="calculate-btn" type="button" class="primary-btn">Calculate Semester</button>
      <button id="clear-btn" type="button" class="danger-btn">Clear All</button>
    </section>

    <!-- JavaScript will create module cards inside this area -->
    <section id="modules-container" class="modules-container"></section>

    <!-- Semester result card -->
    <section id="semester-result" class="semester-result hidden">
      <p>Semester Average Grade</p>
      <h2 id="semester-average">0.00</h2>
      <span id="semester-classification" class="classification-badge">-</span>
      <div class="progress-track">
        <div id="semester-progress" class="progress-bar"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
