<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Academic Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="app">
    <header class="hero glass">
      <p class="eyebrow">Student Academic Dashboard</p>
      <h1>Plan, simulate and track your semester performance.</h1>
      <p class="subtitle">A modern dashboard for module grades, goals, what-if simulations and academic analytics.</p>
    </header>

    <section class="summary-grid">
      <article class="summary-card glass">
        <span>Semester Average</span>
        <strong id="semester-average">0.00</strong>
      </article>
      <article class="summary-card glass">
        <span>Classification</span>
        <strong id="semester-classification">-</strong>
      </article>
      <article class="summary-card glass">
        <span>Status</span>
        <strong id="semester-status">Add data</strong>
      </article>
    </section>

    <section class="toolbar glass">
      <button id="add-module-btn">+ Add Module</button>
      <button id="clear-btn" class="danger-btn">Clear All</button>
    </section>

    <section id="modules-container" class="modules-container"></section>

    <section class="analytics-grid">
      <article class="glass chart-card">
        <h2>Module Performance</h2>
        <canvas id="moduleChart"></canvas>
      </article>
      <article class="glass chart-card">
        <h2>Assessment Weight</h2>
        <canvas id="weightChart"></canvas>
      </article>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
