<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Academic Dashboard</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="topbar glass">
      <div>
        <p class="eyebrow">Student Academic Dashboard</p>
        <h1>Track your semester like a real product dashboard.</h1>
      </div>
      <div class="top-actions">
        <button id="add-module-btn">+ Module</button>
        <button id="clear-btn" class="danger-btn">Clear All</button>
      </div>
    </header>

    <section class="summary-grid">
      <article class="summary-card glass"><span>Semester Average</span><strong id="semester-average">0.00</strong></article>
      <article class="summary-card glass"><span>Classification</span><strong id="semester-classification">-</strong></article>
      <article class="summary-card glass"><span>Status</span><strong id="semester-status">Add data</strong></article>
    </section>

    <section class="dashboard-grid">
      <aside class="panel glass">
        <h2>Modules</h2>
        <div id="module-list"></div>
      </aside>

      <section class="panel glass detail-panel">
        <div id="module-detail"></div>
      </section>

      <aside class="panel glass analytics-panel">
        <h2>Analytics</h2>
        <canvas id="moduleChart"></canvas>
        <canvas id="weightChart"></canvas>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
